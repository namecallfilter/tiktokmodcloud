name: CI

on:
    push:
        branches:
            - main
        paths:
            - "src/**"
            - "package.json"
            - "bun.lock"
    pull_request:
        paths:
            - "src/**"
            - "package.json"
            - "bun.lock"
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint and format check
              run: bun run check
